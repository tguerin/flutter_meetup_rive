name: Deploy Flutter web to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - run: flutter pub get
      - run: flutter build web --release --base-href "/flutter_meetup_rive/" -t lib/main.dart
      - run: flutter build web --release --base-href "/flutter_meetup_rive/play/" -t lib/main_game.dart --output build/play
      - run: mkdir -p build/web/play && cp -R build/play/. build/web/play/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
