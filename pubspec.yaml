name: flutter_meetup_rive
description: Rive + flutter_deck meetup presentation
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  rive: ^0.14.7
  rive_viewmodel: ^1.0.0
  flutter_deck: ^0.28.1
  qr_flutter: ^4.1.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/demo_flutter_minigame.riv
    - assets/card_step_1.riv
    - assets/card_step_2.riv
    - assets/card_step_3.riv
    - assets/betclic_logo.png
    - assets/avatar_thomas.png
    - assets/avatar_nicolas.jpg
    - assets/branding/bg_cover_logo.png
    - assets/branding/bg_welcome.png
    - assets/branding/bg_section.png
    - assets/branding/bg_content.png
    - assets/branding/bg_qa.png
    - assets/branding/bg_thanks.png
    - assets/rive_logo.png
    - assets/rive_main_page.png
    - assets/lottie_files.png
    - assets/game_screen.png
    - assets/arrow_chevron.png
    - assets/lottie_vs_rive.mp4
    - assets/montage_rive.mp4
    - assets/anim_code_2.png
    - assets/anim_code_6.png
    - assets/anim_code_3.png
    - assets/anim_code_4.png
    - assets/anim_code_5.png
    - assets/asset_strategy.png
    # Heavy designer recordings: bundled only in the macOS `desktop` flavor
    # (flavor-conditional assets), so the web/GitHub Pages build stays light.
    - path: assets/record_step_1.mp4
      flavors: [desktop]
    - path: assets/record_step_2.mp4
      flavors: [desktop]
    - path: assets/record_step_3.mp4
      flavors: [desktop]
